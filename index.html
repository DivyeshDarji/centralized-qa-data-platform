<!DOCTYPE html>
<html>

<head>
    <title>Data Platform</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f7fa;
        }

        /* ✅ HEADER */
        .header {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 10px 20px;
            background: #ffffff;
            border-bottom: 1px solid #ccc;
        }

        .logo {
            text-align: left;
        }

        .title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .controls {
            text-align: right;
        }

        .controls select,
        .controls button {
            margin-left: 8px;
            padding: 5px;
        }

        /* ✅ TABS */
        .tabs {
            display: flex;
            background: #e0e4ea;
            padding: 5px;
        }

        .tab {
            padding: 10px 20px;
            background: #cfd6df;
            margin-right: 5px;
            cursor: pointer;
        }

        .tab.active {
            background: white;
            border-bottom: 3px solid #007bff;
            font-weight: bold;
        }

        /* ✅ CONTENT */
        .content {
            padding: 20px;
        }

        select,
        input {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        select:focus,
        input:focus {
            border-color: #3498db;
        }

        table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
            background: white;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            /* increased for readability */
            text-align: left;
        }

        td {
            vertical-align: middle;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:hover {
            background-color: #eef6ff;
        }

        table tr:hover {
            background-color: #f9f9f9;
        }

        th {
            background-color: #ecf0f1;
        }

        .status {
            padding: 10px;
        }

        /* ✅ LAYOUT */
        .main-layout {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* ✅ SIDEBAR */
        .sidebar {
            width: 200px;
            background: #1f2d3d;
            color: white;
        }

        /* ✅ MENU ITEM */
        .menu-item {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #34495e;
        }

        .menu-item:hover {
            background: #34495e;
        }

        .menu-item.active {
            background: #3498db;
            font-weight: bold;
        }

        /* ✅ MAIN CONTENT */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* ✅ Buttons */
        button {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* ✅ Delete */
        .btn-delete {
            background-color: #e74c3c;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        /* ✅ Approve */
        .btn-approve {
            background-color: #2ecc71;
        }

        .btn-approve:hover {
            background-color: #27ae60;
        }

        /* ✅ TABLE CONTAINER */
        .table-container {
            max-height: 400px;
            /* adjust if needed */
            overflow-y: auto;
            border: 1px solid #ccc;
        }

        /* ✅ STICKY HEADER */
        thead th {
            position: sticky;
            top: 0;
            background: #ecf0f1;
            z-index: 2;
        }

        /* ✅ TOAST */
        .toast {
            visibility: hidden;
            min-width: 300px;
            background: #333;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .toast.show {
            visibility: visible;
        }

        .toast.success {
            background: #2ecc71;
        }

        .toast.error {
            background: #e74c3c;
        }

        .toast button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* ✅ LOADER */
        .loader {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            border: 5px solid #ccc;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg) translate(-50%, -50%);
            }
        }
    </style>
</head>

<body>

    <!-- ✅ HEADER -->
    <div class="header">

        <!-- ✅ LEFT: LOGO -->
        <div class="logo">
            <img src="Ingram_micro_logo.png" alt="logo" height="35">
        </div>

        <!-- ✅ CENTER: TITLE -->
        <div class="title">
            Centralized QA Data Platform
        </div>

        <!-- ✅ RIGHT: CONTROLS -->
        <div class="controls">

            <!-- ENV -->
            <select id="globalEnv" onchange="loadAll()">
                <option>QA</option>
                <option>UAT</option>
                <option>PROD</option>
            </select>

            <!-- COUNTRY -->
            <select id="country" onchange="validateInputs()">
                <option value="US" selected>US</option>
                <option value="IN">IN</option>
                <option value="CA">CA</option>
                <option value="MX">MX</option>
                <option value="DE">DE</option>
                <option value="FR">FR</option>
                <option value="IT">IT</option>
                <option value="AU">AU</option>
                <option value="ES">ES</option>
                <option value="UK">UK</option>
            </select>

            <!-- SEARCH BUTTON -->
            <button id="searchBtn" onclick="searchData()">🔍 Search</button>

            <button onclick="loadAll()">🔄 Refresh</button>

        </div>

    </div>

    <!-- ✅ TABS -->
    <div class="main-layout">

        <!-- ✅ SIDEBAR -->
        <div class="sidebar">

            <div class="menu-item active" onclick="switchModule('testdata', this)">
                📂 Test Data
            </div>

            <div class="menu-item" onclick="switchModule('enduser', this)">
                👤 EndUser
            </div>

        </div>

        <!-- ✅ MAIN CONTENT -->
        <div class="main-content">

            <!-- ✅ CONTENT -->
            <div class="content">

                <p id="validationMsg" style="color:red;"></p>

                <h3>🛑 Pending Delete Requests (Admin)</h3>
                <button onclick="loadPending()">View Pending</button>

                <hr>

                <h3>📄 Sample Test Data</h3>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

            </div>



            <script>

                // ✅ MODULE
                let CURRENT_MODULE = "testdata";

                // ✅ SWITCH MODULE (TABS)
                function switchModule(module, element) {

                    CURRENT_MODULE = module;

                    document.querySelectorAll(".menu-item").forEach(tab => tab.classList.remove("active"));
                    element.classList.add("active");

                    loadAll();
                }

                // ✅ BASE URL
                function getBaseUrl() {
                    return `http://localhost:8080/${CURRENT_MODULE}`;
                }

                // ✅ STATUS
                function setStatus(msg, isError = false) {
                    showToast(msg, isError);
                }


                // ✅ LOAD ALL
                async function loadAll() {

                    try {
                        showLoader();

                        let env = document.getElementById("globalEnv").value;

                        const res = await fetch(getBaseUrl() + `/search?environment=${env}`);

                        // ✅ CHECK RESPONSE
                        if (!res.ok) {
                            let error = await res.text();
                            setStatus(error, true);
                            return;
                        }

                        const data = await res.json();

                        displayData(data);

                        setStatus("Loaded successfully");

                    } catch (err) {
                        setStatus("Error loading data", true);
                    }
                    finally {
                        hideLoader();
                    }

                }

                // ✅ SEARCH
                async function searchData() {

                    //let fieldName = document.getElementById("fieldName").value;
                    let country = document.getElementById("country").value;
                    let env = document.getElementById("globalEnv").value;

                    if (!validateInputs()) {
                        return;
                    }

                    try {
                        searchData();

                        let url = getBaseUrl() + `/search?environment=${env}`;

                        //if (fieldName) url += `&fieldName=${fieldName}`;
                        if (country) url += `&country=${country}`;

                        const res = await fetch(url);

                        // ✅ CHECK RESPONSE
                        if (!res.ok) {
                            let error = await res.text();
                            setStatus(error, true);
                            return;
                        }

                        const data = await res.json();

                        displayData(data);

                        setStatus("Search complete");

                    } catch (err) {
                        setStatus("Search failed", true);
                    } finally { hideLoader() }
                }

                // ✅ PENDING
                async function loadPending() {
                    try {
                        showLoader();

                        const res = await fetch(getBaseUrl() + "/pending");

                        // ✅ CHECK RESPONSE
                        if (!res.ok) {
                            let error = await res.text();
                            setStatus(error, true);
                            return;
                        }

                        const data = await res.json();

                        displayData(data, true);

                        setStatus("Pending loaded");

                    } catch (err) {
                        setStatus("Error loading pending", true);
                    } finally { hideLoader() }
                }

                // ✅ DISPLAY DATA (UNCHANGED LOGIC)
                function displayData(data, isPending = false) {

                    const tableHead = document.querySelector("thead tr");
                    const tableBody = document.getElementById("tableBody");

                    tableHead.innerHTML = "";
                    tableBody.innerHTML = "";

                    if (CURRENT_MODULE === "enduser") {

                        tableHead.innerHTML = `
        <th>ID</th>
        <th>EndUser Name</th>
        <th>Env</th>
        <th>Country</th>
        <th>Address Line 1</th>
        <th>Address Line 2</th>
        <th>Address Line 3</th>
        <th>City</th>
        <th>State</th>
        <th>Postal Code</th>
        <th>Market Segment</th>
        <th>Contact</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Tag</th>
        <th>Action</th>
        `;

                        if (!data || data.length === 0) {
                            tableBody.innerHTML = "<tr><td colspan='16'>No Data Found</td></tr>";
                            return;
                        }

                        data.forEach(item => {

                            let row = "<tr>";

                            row += `<td>${item.id}</td>`;
                            row += `<td>${item.endUserName || ""}</td>`;
                            row += `<td>${item.environment || ""}</td>`;
                            row += `<td>${item.country || ""}</td>`;
                            row += `<td>${item.addressLine1 || ""}</td>`;
                            row += `<td>${item.addressLine2 || ""}</td>`;
                            row += `<td>${item.addressLine3 || ""}</td>`;
                            row += `<td>${item.city || ""}</td>`;
                            row += `<td>${item.state || ""}</td>`;
                            row += `<td>${item.postalCode || ""}</td>`;
                            row += `<td>${item.marketSegmentType || ""}</td>`;
                            row += `<td>${item.contactName || ""}</td>`;
                            row += `<td>${item.email || ""}</td>`;
                            row += `<td>${item.phoneNumber || ""}</td>`;
                            row += `<td>${item.tag || ""}</td>`;

                            if (isPending) {
                                row += `<td><button class="btn-approve" onclick="approveDelete(${item.id})">✅ Approve</button></td>`;
                            } else {
                                row += `<td><button class="btn-delete" onclick="requestDelete(${item.id})">🗑 Delete</button></td>`;
                            }

                            row += "</tr>";

                            tableBody.innerHTML += row;
                        });

                    } else {

                        tableHead.innerHTML = `
        <th>ID</th>
        <th>Field</th>
        <th>Value</th>
        <th>Environment</th>
        <th>Country</th>
        <th>Tag</th>
        <th>Action</th>
        `;

                        if (!data || data.length === 0) {
                            tableBody.innerHTML = "<tr><td colspan='7'>No Data Found</td></tr>";
                            return;
                        }

                        data.forEach(item => {

                            let row = "<tr>";

                            row += `<td>${item.id}</td>`;
                            row += `<td>${item.fieldName}</td>`;
                            row += `<td>${item.fieldValue}</td>`;
                            row += `<td>${item.environment}</td>`;
                            row += `<td>${item.country}</td>`;
                            row += `<td>${item.tag || ""}</td>`;

                            if (isPending) {
                                row += `<td><button class="btn-approve" onclick="approveDelete(${item.id})">✅ Approve</button></td>`;
                            } else {
                                row += `<td><button class="btn-delete" onclick="requestDelete(${item.id})">🗑 Delete</button></td>`;
                            }

                            row += "</tr>";

                            tableBody.innerHTML += row;
                        });
                    }
                }

                // ✅ DELETE
                async function requestDelete(id) {
                    await fetch(`${getBaseUrl()}/${id}`, { method: "DELETE" });
                    setStatus("Delete requested");
                    loadAll();
                }

                // ✅ APPROVE DELETE
                async function approveDelete(id) {
                    await fetch(`${getBaseUrl()}/admin/${id}`, { method: "DELETE" });
                    setStatus("Deleted");
                    loadPending();
                }

                // ✅ INIT
                loadAll();

                // ✅ VALIDATION
                function validateInputs() {
                    return true;
                }

                // ✅ SWITCH MODULE (SIDEBAR)
                function switchModule(module, element) {

                    CURRENT_MODULE = module;

                    document.querySelectorAll(".menu-item")
                        .forEach(item => item.classList.remove("active"));

                    element.classList.add("active");

                    loadAll();
                }

                // ✅ TOAST
                function showToast(message, isError = false) {

                    const toast = document.getElementById("toast");
                    const msg = document.getElementById("toastMsg");

                    msg.innerText = message;

                    toast.className = "toast show " + (isError ? "error" : "success");

                    setTimeout(() => {
                        toast.className = "toast";
                    }, 5000);
                }

                function closeToast() {
                    document.getElementById("toast").className = "toast";
                }

                // ✅ LOADER
                function showLoader() {
                    document.getElementById("loader").style.display = "block";
                }

                function hideLoader() {
                    document.getElementById("loader").style.display = "none";
                }


            </script>

        </div>
    </div>

    <!-- ✅ TOAST -->
    <div id="toast" class="toast">
        <span id="toastMsg"></span>
        <button onclick="closeToast()">✖</button>
    </div>

    <!-- ✅ LOADER -->
    <div id="loader" class="loader"></div>
</body>

</html>
