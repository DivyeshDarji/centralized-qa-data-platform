<!DOCTYPE html>
<html>
<head>
<title>Centralized QA Data Platform</title>

<style>

body {
    font-family: Arial;
    margin: 0;
    background: #f5f7fa;
}

/* ✅ HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: #ffffff;
    border-bottom: 1px solid #ccc;
}

.title {
    font-size: 20px;
    font-weight: bold;
}

/* ✅ TABS */
.tabs {
    display: flex;
    background: #e0e4ea;
    padding: 5px;
}

.tab {
    padding: 10px 20px;
    background: #cfd6df;
    margin-right: 5px;
    cursor: pointer;
}

.tab.active {
    background: white;
    border-bottom: 3px solid #007bff;
    font-weight: bold;
}

/* ✅ CONTENT */
.content {
    padding: 20px;
}

input, select {
    padding: 5px;
    margin: 5px;
}

button {
    padding: 6px 10px;
    margin: 5px;
}

table {
    margin-top: 20px;
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
}

th {
    background: #f2f2f2;
}

.status {
    padding: 10px;
}

</style>
</head>

<body>

<!-- ✅ HEADER -->
<div class="header">
    <div class="title">Centralized QA Data Platform</div>

    <div>
        <label>Env:</label>
        <select id="globalEnv" onchange="loadAll()">
            <option>QA</option>
            <option>UAT</option>
            <option>PROD</option>
        </select>
    </div>
</div>

<!-- ✅ STATUS -->
<p id="status" class="status"></p>

<!-- ✅ MODULE TABS -->
<div class="tabs">
    <div class="tab active" onclick="switchModule('testdata', this)">Test Data</div>
    <div class="tab" onclick="switchModule('enduser', this)">EndUser</div>
</div>

<!-- ✅ CONTENT -->
<div class="content">

<h3>🔍 Search Data</h3>

<input id="fieldName" placeholder="Field Name / Value (optional)">
<input id="country" placeholder="Country (optional)">

<button onclick="searchData()">Search</button>
<button onclick="loadAll()">Load All</button>

<hr>

<h3>🛑 Pending Delete Requests (Admin)</h3>
<button onclick="loadPending()">View Pending</button>

<hr>

<h3>📄 Data</h3>

<table>
<thead>
<tr></tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>

// ✅ MODULE
let CURRENT_MODULE = "testdata";

// ✅ SWITCH MODULE (TABS)
function switchModule(module, element) {

    CURRENT_MODULE = module;

    document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
    element.classList.add("active");

    loadAll();
}

// ✅ BASE URL
function getBaseUrl() {
    return `http://localhost:8080/${CURRENT_MODULE}`;
}

// ✅ STATUS
function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.innerText = msg;
    el.style.color = isError ? "red" : "green";
}

// ✅ LOAD ALL
async function loadAll() {

    try {
        setStatus("Loading...");

        let env = document.getElementById("globalEnv").value;

        const res = await fetch(getBaseUrl() + `/search?environment=${env}`);
        const data = await res.json();

        displayData(data);

        setStatus("Loaded successfully");

    } catch (err) {
        setStatus("Error loading data", true);
    }
}

// ✅ SEARCH
async function searchData() {

    let fieldName = document.getElementById("fieldName").value;
    let country = document.getElementById("country").value;
    let env = document.getElementById("globalEnv").value;

    if (!fieldName && !country) {
        setStatus("Please enter at least one filter", true);
        return;
    }

    try {
        setStatus("Searching...");

        let url = getBaseUrl() + `/search?environment=${env}`;

        if (fieldName) url += `&fieldName=${fieldName}`;
        if (country) url += `&country=${country}`;

        const res = await fetch(url);
        const data = await res.json();

        displayData(data);

        setStatus("Search complete");

    } catch (err) {
        setStatus("Search failed", true);
    }
}

// ✅ PENDING
async function loadPending() {
    try {
        setStatus("Loading pending...");

        const res = await fetch(getBaseUrl() + "/pending");
        const data = await res.json();

        displayData(data, true);

        setStatus("Pending loaded");

    } catch (err) {
        setStatus("Error loading pending", true);
    }
}

// ✅ DISPLAY DATA (UNCHANGED LOGIC)
function displayData(data, isPending = false) {

    const tableHead = document.querySelector("thead tr");
    const tableBody = document.getElementById("tableBody");

    tableHead.innerHTML = "";
    tableBody.innerHTML = "";

    if (CURRENT_MODULE === "enduser") {

        tableHead.innerHTML = `
        <th>ID</th>
        <th>EndUser Name</th>
        <th>Env</th>
        <th>Country</th>
        <th>Address Line 1</th>
        <th>Address Line 2</th>
        <th>Address Line 3</th>
        <th>City</th>
        <th>State</th>
        <th>Postal Code</th>
        <th>Market Segment</th>
        <th>Contact</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Tag</th>
        <th>Action</th>
        `;

        if (!data || data.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='16'>No Data Found</td></tr>";
            return;
        }

        data.forEach(item => {

            let row = "<tr>";

            row += `<td>${item.id}</td>`;
            row += `<td>${item.endUserName || ""}</td>`;
            row += `<td>${item.environment || ""}</td>`;
            row += `<td>${item.country || ""}</td>`;
            row += `<td>${item.addressLine1 || ""}</td>`;
            row += `<td>${item.addressLine2 || ""}</td>`;
            row += `<td>${item.addressLine3 || ""}</td>`;
            row += `<td>${item.city || ""}</td>`;
            row += `<td>${item.state || ""}</td>`;
            row += `<td>${item.postalCode || ""}</td>`;
            row += `<td>${item.marketSegmentType || ""}</td>`;
            row += `<td>${item.contactName || ""}</td>`;
            row += `<td>${item.email || ""}</td>`;
            row += `<td>${item.phoneNumber || ""}</td>`;
            row += `<td>${item.tag || ""}</td>`;

            if (isPending) {
                row += `<td><button onclick="approveDelete(${item.id})">Approve</button></td>`;
            } else {
                row += `<td><button onclick="requestDelete(${item.id})">Delete</button></td>`;
            }

            row += "</tr>";

            tableBody.innerHTML += row;
        });

    } else {

        tableHead.innerHTML = `
        <th>ID</th>
        <th>Field</th>
        <th>Value</th>
        <th>Environment</th>
        <th>Country</th>
        <th>Tag</th>
        <th>Action</th>
        `;

        if (!data || data.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='7'>No Data Found</td></tr>";
            return;
        }

        data.forEach(item => {

            let row = "<tr>";

            row += `<td>${item.id}</td>`;
            row += `<td>${item.fieldName}</td>`;
            row += `<td>${item.fieldValue}</td>`;
            row += `<td>${item.environment}</td>`;
            row += `<td>${item.country}</td>`;
            row += `<td>${item.tag || ""}</td>`;

            if (isPending) {
                row += `<td><button onclick="approveDelete(${item.id})">Approve</button></td>`;
            } else {
                row += `<td><button onclick="requestDelete(${item.id})">Delete</button></td>`;
            }

            row += "</tr>";

            tableBody.innerHTML += row;
        });
    }
}

// ✅ DELETE
async function requestDelete(id) {
    await fetch(`${getBaseUrl()}/${id}`, { method: "DELETE" });
    setStatus("Delete requested");
    loadAll();
}

// ✅ APPROVE DELETE
async function approveDelete(id) {
    await fetch(`${getBaseUrl()}/admin/${id}`, { method: "DELETE" });
    setStatus("Deleted");
    loadPending();
}

// ✅ INIT
loadAll();

</script>

</body>
</html>
