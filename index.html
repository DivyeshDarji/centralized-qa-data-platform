<!DOCTYPE html>
<html>

<head>
    <title>Data Platform</title>

    <!-- ✅ FAVICON -->
    <button class="btn-primary" onclick="openForm()">➕ Add EndUser</button>

    <!-- ✅ ROLE SWITCHER (FOR SIMULATION PURPOSES) -->
    <label>Role:</label>
    <select id="userRole" onchange="changeRole(this.value)">
        <option value="ADMIN">ADMIN</option>
        <option value="QA">QA</option>
    </select>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            color: #2c3e50;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
        }

        h3 {
            font-size: 18px;
            font-weight: 500;
        }

        /* ✅ HEADER */
        .header {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 10px 20px;
            background: #ffffff;
            border-bottom: 1px solid #ccc;
        }

        .logo {
            text-align: left;
        }

        .title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .controls {
            text-align: right;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls label {
            font-size: 13px;
            font-weight: 500;
        }

        .controls select,
        .controls button {
            margin-left: 8px;
            padding: 5px;
        }

        /* ✅ TABS */
        .tabs {
            display: flex;
            background: #e0e4ea;
            padding: 5px;
        }

        .tab {
            padding: 10px 20px;
            background: #cfd6df;
            margin-right: 5px;
            cursor: pointer;
        }

        .tab.active {
            background: white;
            border-bottom: 3px solid #007bff;
            font-weight: bold;
        }

        /* ✅ CONTENT */
        .content {
            padding: 20px;
        }

        select {
            padding: 5px 8px;
            border-radius: 5px;
            font-size: 13px;
        }


        select:focus,
        input:focus {
            border-color: #3498db;
        }

        table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
            background: white;
            border-spacing: 0;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            /* increased for readability */
            text-align: left;
        }

        td {
            vertical-align: middle;
            font-size: 13px;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:hover {
            background-color: #eef6ff;
        }

        table tr:hover {
            background-color: #f9f9f9;
        }

        th {
            background-color: #ecf0f1;
            font-weight: 600;
            font-size: 13px;
        }

        .status {
            padding: 10px;
        }

        /* ✅ LAYOUT */
        .main-layout {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* ✅ SIDEBAR BASE */
        .sidebar {
            width: 60px;
            background: #e0e8f5;
            color: white;
            transition: width 0.3s;
            overflow: hidden;
            font-size: 14px;
        }

        /* ✅ EXPAND ON HOVER */
        .sidebar:hover {
            width: 200px;
        }

        /* ✅ MENU ITEM */
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            cursor: pointer;
            gap: 10px;
            font-size: 14px;
        }

        /* ✅ ICON */
        .icon {
            font-size: 18px;
            width: 25px;
        }

        /* ✅ TEXT HIDDEN BY DEFAULT */
        .text {
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* ✅ SHOW TEXT ON HOVER */
        .sidebar:hover .text {
            opacity: 1;
        }

        /* ✅ ACTIVE ITEM */
        .menu-item.active {
            background: #cfd6df;
            color: #2c3e50;
            border-radius: 20px;
        }

        /* ✅ HOVER EFFECT */
        .menu-item:hover {
            background: #afd2f4;
        }

        /* ✅ MAIN CONTENT */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* ✅ Buttons */
        button {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* ✅ Primary (Refresh / search) */
        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        /* ✅ Delete */
        .btn-delete {
            background: #ea5848;
            color: #ffffff;
            font-size: 13px;
            padding: 5px 10px;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        /* ✅ Approve */
        .btn-approve {
            background: #2ecc71;
            color: white;
        }

        .btn-approve:hover {
            background: #27ae60;
        }

        /* ✅ TABLE CONTAINER */
        .table-container {
            max-height: 400px;
            /* adjust if needed */
            overflow-y: auto;
            border: 1px solid #ccc;
        }

        /* ✅ STICKY HEADER */
        thead th {
            position: sticky;
            top: 0;
            background: #ecf0f1;
            z-index: 2;
        }

        /* ✅ TOAST */
        .toast {
            visibility: hidden;
            min-width: 300px;
            background: #333;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .toast.show {
            visibility: visible;
        }

        .toast.success {
            background: #2ecc71;
        }

        .toast.error {
            background: #e74c3c;
        }

        .toast button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* ✅ LOADER */
        .loader {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            border: 5px solid #ccc;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg) translate(-50%, -50%);
            }
        }

        /* ✅ ADMIN BUTTON */
        .btn-admin {
            background: #f39c12;
            color: white;
        }

        .btn-admin:hover {
            background: #d68910;
        }
    </style>
</head>

<!-- ✅ END USER FORM (HIDDEN BY DEFAULT) -->
<div id="endUserForm" style="display:none; background:#f4f6f8; padding:15px; margin-bottom:15px; border-radius:8px;">

    <h3>Add EndUser</h3>

    <input id="eu_name" placeholder="EndUser Name">
    <input id="eu_city" placeholder="City">
    <input id="eu_state" placeholder="State (2-char)">
    <input id="eu_postal" placeholder="Postal Code">

    <select id="eu_country">
        <option value="US">US</option>
        <option value="IN">IN</option>
        <option value="CA">CA</option>
        <option value="MX">MX</option>
        <option value="DE">DE</option>
        <option value="FR">FR</option>
        <option value="IT">IT</option>
        <option value="AU">AU</option>
        <option value="ES">ES</option>
        <option value="UK">UK</option>
    </select>

    <input id="eu_email" placeholder="Email">
    <input id="eu_phone" placeholder="Phone">

    <input id="eu_tag" placeholder="Tag">

    <button class="btn-primary" onclick="saveEndUser()">💾 Save</button>
    <button onclick="closeForm()">Cancel</button>

</div>

<body>

    <!-- ✅ HEADER -->
    <div class="header">

        <!-- ✅ LEFT: LOGO -->
        <div class="logo">
            <img src="logo.png" alt="logo-placeholder" height="35">
        </div>

        <!-- ✅ CENTER: TITLE -->
        <div class="title">
            Centralized QA Data Platform
        </div>

        <!-- ✅ RIGHT: CONTROLS -->
        <div class="controls">

            <!-- ENV -->
            <label>Env:</label>
            <select id="globalEnv" onchange="handleFilterChange()">
                <option selected>QA</option>
                <option>UAT</option>
                <option>PROD</option>
            </select>

            <!-- COUNTRY -->
            <label>Country:</label>
            <select id="country" onchange="handleFilterChange()">
                <option value="US" selected>US</option>
                <option value="IN">IN</option>
                <option value="CA">CA</option>
                <option value="MX">MX</option>
                <option value="DE">DE</option>
                <option value="FR">FR</option>
                <option value="IT">IT</option>
                <option value="AU">AU</option>
                <option value="ES">ES</option>
                <option value="UK">UK</option>
            </select>

            <!-- SEARCH BUTTON
            <button id="searchBtn" onclick="searchData()">🔍 Search</button> -->

            <!-- ADMIN BUTTON -->
            <button class="btn-admin" onclick="loadPending()">🛑 Admin</button>

            <!-- REFRESH BUTTON -->
            <button class="btn-primary" onclick="loadAll()">🔄 Refresh</button>

        </div>

    </div>

    <!-- ✅ TABS -->
    <div class="main-layout">

        <!-- ✅ SIDEBAR -->
        <div class="sidebar">

            <div class="menu-item active" onclick="switchModule('testdata', this)">
                <span class="icon">📂</span>
                <span class="text">Test Data</span>
            </div>

            <div class="menu-item" onclick="switchModule('enduser', this)">
                <span class="icon">👤</span>
                <span class="text">End User</span>
            </div>

        </div>

        <!-- ✅ MAIN CONTENT -->
        <div class="main-content">

            <!-- ✅ CONTENT -->
            <div class="content">

                <p id="validationMsg" style="color:red;"></p>

                <div class="table-container">
                    <h2 id="pageTitle"></h2>
                    <table>
                        <thead>
                            <tr></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div id="pagination" style="margin-top:10px;"></div>
            </div>

            <script>

                // ✅ USER ROLE (SIMULATION)
                let USER_ROLE = "ADMIN"; // change to "QA" for testing

                // ✅ ADD PAGINATION VARIABLES
                let CURRENT_PAGE = 0;
                let PAGE_SIZE = 5;

                // ✅ GLOBAL STATE
                let EDIT_MODE = false;
                let EDIT_ID = null;

                // ✅ MODULE
                let CURRENT_MODULE = "testdata";

                // ✅ SWITCH MODULE (TABS)
                function switchModule(moduleName, element) {

                    CURRENT_MODULE = moduleName;

                    document.querySelectorAll(".menu-item")
                        .forEach(item => item.classList.remove("active"));

                    element.classList.add("active");

                    // ✅ Dynamic title update
                    updatePageTitle(moduleName);

                    loadAll();
                }

                // ✅ BASE URL
                function getBaseUrl() {
                    return `https://centralized-qa-data-platform.onrender.com/${CURRENT_MODULE}`;
                }

                // ✅ STATUS
                function setStatus(msg, isError = false) {
                    showToast(msg, isError);
                }


                // ✅ LOAD ALL
                async function loadAll() {

                    try {
                        showLoader();

                        let env = document.getElementById("globalEnv").value;
                        let country = document.getElementById("country").value;

                        let url = getBaseUrl() +
                            `/search?environment=${env}&country=${country}&page=${CURRENT_PAGE}&size=${PAGE_SIZE}`

                        const res = await fetch(url);

                        // ✅ CHECK RESPONSE
                        if (!res.ok) {
                            let error = await res.text();
                            setStatus(error, true);
                            return;
                        }

                        const data = await res.json();

                        displayData(data.content);

                        renderPagination(data.totalPages);

                        setStatus("Loaded successfully");

                    } catch (err) {
                        setStatus("Error loading data", true);
                    }
                    finally {
                        hideLoader();
                    }
                    updatePageTitle(CURRENT_MODULE);
                }

                // ✅ SEARCH
                async function searchData() {

                    //let fieldName = document.getElementById("fieldName").value;
                    let country = document.getElementById("country").value;
                    let env = document.getElementById("globalEnv").value;

                    if (!validateInputs()) {
                        return;
                    }

                    try {
                        searchData();

                        let url = getBaseUrl() + `/search?environment=${env}`;

                        //if (fieldName) url += `&fieldName=${fieldName}`;
                        if (country) url += `&country=${country}`;

                        const res = await fetch(url);

                        // ✅ CHECK RESPONSE
                        if (!res.ok) {
                            let error = await res.text();
                            setStatus(error, true);
                            return;
                        }

                        const data = await res.json();

                        displayData(data);

                        setStatus("Search complete");

                    } catch (err) {
                        setStatus("Search failed", true);
                    } finally { hideLoader() }
                }

                // ✅ PENDING
                async function loadPending() {
                    try {

                        // ✅ CHECK ROLE
                        if (USER_ROLE !== "ADMIN") {
                            setStatus("Access Denied ❌", true);
                            return;
                        }

                        showLoader();

                        const res = await fetch(getBaseUrl() + "/pending");

                        // ✅ CHECK RESPONSE
                        if (!res.ok) {
                            let error = await res.text();
                            setStatus(error, true);
                            return;
                        }

                        const data = await res.json();

                        displayData(data, true);

                        // ✅ Dynamic title update
                        updatePageTitle(null, true);

                        setStatus("Pending loaded");

                    } catch (err) {
                        setStatus("Error loading pending", true);
                    } finally { hideLoader() }
                }

                // ✅ DISPLAY DATA (UNCHANGED LOGIC)
                function displayData(data, isPending = false) {

                    const tableHead = document.querySelector("thead tr");
                    const tableBody = document.getElementById("tableBody");

                    tableHead.innerHTML = "";
                    tableBody.innerHTML = "";

                    if (CURRENT_MODULE === "enduser") {

                        tableHead.innerHTML = `
        <th>ID</th>
        <th>EndUser Name</th>
        <th>Env</th>
        <th>Country</th>
        <th>Add Line 1</th>
        <th>Add Line 2</th>
        <th>Add Line 3</th>
        <th>City</th>
        <th>State</th>
        <th>Postal Code</th>
        <th>Market Segment</th>
        <th>Contact Name</th>
        <th>Email ID</th>
        <th>Phone Number</th>
        <th>Tag</th>
        <th>Action</th>
        `;

                        if (!data || data.length === 0) {
                            tableBody.innerHTML = "<tr><td colspan='16'>No Data Found</td></tr>";
                            return;
                        }

                        data.forEach(item => {

                            let row = "<tr>";

                            row += `<td>${item.id}</td>`;
                            row += `<td>${item.endUserName || ""}</td>`;
                            row += `<td>${item.environment || ""}</td>`;
                            row += `<td>${item.country || ""}</td>`;
                            row += `<td>${item.addressLine1 || ""}</td>`;
                            row += `<td>${item.addressLine2 || ""}</td>`;
                            row += `<td>${item.addressLine3 || ""}</td>`;
                            row += `<td>${item.city || ""}</td>`;
                            row += `<td>${item.state || ""}</td>`;
                            row += `<td>${item.postalCode || ""}</td>`;
                            row += `<td>${item.marketSegmentType || ""}</td>`;
                            row += `<td>${item.contactName || ""}</td>`;
                            row += `<td>${item.email || ""}</td>`;
                            row += `<td>${item.phoneNumber || ""}</td>`;
                            row += `<td>${item.tag || ""}</td>`;

                            if (isPending) {
                                row += `<td><button class="btn-approve" onclick="approveDelete(${item.id})">✅ Approve</button></td>`;
                            } else {

                                row += `<td><button class="btn-primary" onclick='editEndUser(${JSON.stringify(item)})'>✏ Edit</button>
                                <button class="btn-delete" onclick="requestDelete(${item.id})">🗑 Delete</button>`;
                            }

                            row += "</tr>";

                            tableBody.innerHTML += row;
                        });

                    } else {

                        tableHead.innerHTML = `
        <th>ID</th>
        <th>Field</th>
        <th>Value</th>
        <th>Environment</th>
        <th>Country</th>
        <th>Tag</th>
        <th>Action</th>
        `;

                        if (!data || data.length === 0) {
                            tableBody.innerHTML = "<tr><td colspan='7'>No Data Found</td></tr>";
                            return;
                        }

                        data.forEach(item => {

                            let row = "<tr>";

                            row += `<td>${item.id}</td>`;
                            row += `<td>${item.fieldName}</td>`;
                            row += `<td>${item.fieldValue}</td>`;
                            row += `<td>${item.environment}</td>`;
                            row += `<td>${item.country}</td>`;
                            row += `<td>${item.tag || ""}</td>`;

                            if (isPending) {
                                row += `<td><button class="btn-approve" onclick="approveDelete(${item.id})">✅ Approve</button></td>`;
                            } else {
                                row += `<td><button class="btn-delete" onclick="requestDelete(${item.id})">🗑 Delete</button></td>`;
                            }

                            row += "</tr>";

                            tableBody.innerHTML += row;
                        });
                    }
                }

                // ✅ DELETE
                async function requestDelete(id) {
                    await fetch(`${getBaseUrl()}/${id}`, { method: "DELETE" });
                    setStatus("Delete requested");
                    loadAll();
                }

                // ✅ APPROVE DELETE
                async function approveDelete(id) {

                    // ✅ CHECK ROLE
                    if (USER_ROLE !== "ADMIN") {
                        setStatus("Access Denied ❌", true);
                        return;
                    }

                    await fetch(`${getBaseUrl()}/admin/${id}`, { method: "DELETE" });
                    setStatus("Deleted");
                    loadPending();
                }

                // ✅ INIT
                loadAll();

                // ✅ VALIDATION
                function validateInputs() {
                    return true;
                }

                // ✅ SWITCH MODULE (SIDEBAR)
                function switchModule(moduleName, element) {

                    CURRENT_MODULE = moduleName;

                    document.querySelectorAll(".menu-item")
                        .forEach(item => item.classList.remove("active"));

                    element.classList.add("active");

                    // ✅ Dynamic title update
                    updatePageTitle(moduleName);

                    loadAll();
                }

                // ✅ TOAST
                function showToast(message, isError = false) {

                    const toast = document.getElementById("toast");
                    const msg = document.getElementById("toastMsg");

                    msg.innerText = message;

                    toast.className = "toast show " + (isError ? "error" : "success");

                    setTimeout(() => {
                        toast.className = "toast";
                    }, 5000);
                }

                function closeToast() {
                    document.getElementById("toast").className = "toast";
                }

                // ✅ LOADER
                function showLoader() {
                    document.getElementById("loader").style.display = "block";
                }

                function hideLoader() {
                    document.getElementById("loader").style.display = "none";
                }

                function handleFilterChange() {
                    CURRENT_PAGE = 0;
                    loadAll();
                }

                // ✅ UPDATE PAGE TITLE
                function updatePageTitle(moduleName, isAdmin = false) {

                    const title = document.getElementById("pageTitle");

                    if (isAdmin) {
                        title.innerText = "👮 Admin - Pending Approval Data";
                        return;
                    }

                    // ✅ Capitalize first letter (for clean display)
                    const formatted =
                        moduleName.charAt(0).toUpperCase() +
                        moduleName.slice(1);

                    title.innerText = `📄 Sample Test Data: ${formatted}`;
                }

                // ✅ END USER FORM
                function openForm() {
                    document.getElementById("endUserForm").style.display = "block";
                }

                // ✅ CLOSE FORM
                function closeForm() {

                    document.getElementById("endUserForm").style.display = "none";

                    EDIT_MODE = false;
                    EDIT_ID = null;

                    document.getElementById("eu_name").value = "";
                    document.getElementById("eu_city").value = "";
                    document.getElementById("eu_state").value = "";
                    document.getElementById("eu_postal").value = "";
                    document.getElementById("eu_email").value = "";
                    document.getElementById("eu_phone").value = "";
                    document.getElementById("eu_tag").value = "";
                }

                // ✅ SAVE END USER
                async function saveEndUser() {

                    const payload = {
                        endUserName: document.getElementById("eu_name").value,
                        city: document.getElementById("eu_city").value,
                        state: document.getElementById("eu_state").value,
                        postalCode: document.getElementById("eu_postal").value,
                        country: document.getElementById("eu_country").value,
                        email: document.getElementById("eu_email").value,
                        phoneNumber: document.getElementById("eu_phone").value,
                        tag: document.getElementById("eu_tag").value,
                        environment: document.getElementById("globalEnv").value
                    };

                    if (!payload.endUserName || !payload.tag) {
                        setStatus("Name and Tag are required ❌", true);
                        return;
                    }

                    try {

                        let url = getBaseUrl();
                        let method = "POST";

                        // ✅ SWITCH TO EDIT MODE
                        if (EDIT_MODE) {
                            url = `${getBaseUrl()}/enduser/${EDIT_ID}`;
                            method = "PUT";
                        }

                        const res = await fetch(url, {
                            method: method,
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(payload)
                        });

                        if (!res.ok) {
                            const error = await res.text();
                            setStatus(error, true);
                            return;
                        }

                        setStatus(EDIT_MODE ? "EndUser updated ✅" : "EndUser created ✅");

                        // ✅ RESET
                        EDIT_MODE = false;
                        EDIT_ID = null;

                        closeForm();
                        loadAll();

                    } catch (err) {
                        setStatus("Error saving data ❌", true);
                    }
                }

                // ✅ EDIT END USER (LOAD DATA INTO FORM)
                function editEndUser(data) {

                    openForm();

                    EDIT_MODE = true;
                    EDIT_ID = data.id;

                    document.getElementById("eu_name").value = data.endUserName || "";
                    document.getElementById("eu_city").value = data.city || "";
                    document.getElementById("eu_state").value = data.state || "";
                    document.getElementById("eu_postal").value = data.postalCode || "";
                    document.getElementById("eu_country").value = data.country || "US";
                    document.getElementById("eu_email").value = data.email || "";
                    document.getElementById("eu_phone").value = data.phoneNumber || "";
                    document.getElementById("eu_tag").value = data.tag || "";

                    setStatus("Edit mode enabled ✏");
                }

                // ✅ RENDER PAGINATION
                function renderPagination(totalPages) {

                    const container = document.getElementById("pagination");
                    container.innerHTML = "";

                    for (let i = 0; i < totalPages; i++) {

                        container.innerHTML += `
            <button class="btn-primary"
                onclick="goToPage(${i})">
                ${i + 1}
            </button>
        `;
                    }
                }

                // ADD PAGE NAVIGATION FUNCTION
                function goToPage(page) {
                    CURRENT_PAGE = page;
                    loadAll();
                }

                // ✅ CHANGE ROLE (FOR SIMULATION)
                function changeRole(role) {
                    USER_ROLE = role;
                    document.querySelector(".btn-admin").style.display =
                        USER_ROLE === "ADMIN" ? "inline-block" : "none";
                    setStatus("Role changed to " + role);
                    loadAll();
                }

            </script>

        </div>
    </div>

    <!-- ✅ TOAST -->
    <div id="toast" class="toast">
        <span id="toastMsg"></span>
        <button onclick="closeToast()">✖</button>
    </div>

    <!-- ✅ LOADER -->
    <div id="loader" class="loader"></div>
</body>

</html>
